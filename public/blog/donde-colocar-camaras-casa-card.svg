<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Camara bala exterior y domo interior</title>
  <desc id="desc">Comparacion visual entre camara bala para exterior y camara domo para interior.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <line x1="600" y1="70" x2="600" y2="560" stroke="#475569" stroke-width="2"/>

  <text x="300" y="82" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#93c5fd">Exterior</text>
  <text x="900" y="82" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#86efac">Interior</text>

  <rect x="80" y="120" width="440" height="410" rx="20" fill="#1e293b" stroke="#60a5fa"/>
  <rect x="680" y="120" width="440" height="410" rx="20" fill="#1f2937" stroke="#4ade80"/>

  <rect x="150" y="240" width="210" height="52" rx="24" fill="#e2e8f0"/>
  <circle cx="372" cy="266" r="36" fill="#94a3b8"/>
  <circle cx="372" cy="266" r="18" fill="#0f172a"/>
  <path d="M408 266 L500 320 L408 356 Z" fill="#60a5fa" opacity="0.45"/>

  <circle cx="900" cy="290" r="70" fill="#cbd5e1"/>
  <circle cx="900" cy="290" r="42" fill="#94a3b8"/>
  <circle cx="900" cy="290" r="18" fill="#0f172a"/>
  <path d="M900 290 L1030 338 L770 338 Z" fill="#86efac" opacity="0.3"/>

  <text x="110" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#e2e8f0">Camara bala robusta</text>
  <text x="110" y="448" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#cbd5e1">Ideal para entradas, patio y perimetro</text>

  <text x="710" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#dcfce7">Camara domo discreta</text>
  <text x="710" y="448" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#bbf7d0">Perfecta para sala y pasillos internos</text>

  <text x="600" y="594" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#f8fafc">Ubicacion correcta + tipo de camara correcto = proteccion efectiva</text>
</svg>
