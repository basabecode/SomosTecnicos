<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Mantenimiento de calentador</title>
  <desc id="desc">Ilustracion de un calentador de agua con herramientas de mantenimiento preventivo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="930" cy="140" r="180" fill="#60a5fa" opacity="0.2"/>
  <rect x="730" y="150" width="240" height="330" rx="20" fill="#e5e7eb"/>
  <circle cx="850" cy="250" r="48" fill="#f97316"/>
