<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Guia de seleccion Dahua vs Hikvision</title>
  <desc id="desc">Comparativa de Dahua y Hikvision con ventajas de video IP para sistemas CCTV modernos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="leftHeader" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="rightHeader" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="600" y="74" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700" fill="#0f172a">
    Guia de Seleccion de Video IP
  </text>
  <text x="600" y="120" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#334155">
    Dahua, Hikvision y sistemas CCTV modernos
  </text>

  <rect x="40" y="156" width="540" height="56" rx="28" fill="url(#leftHeader)"/>
  <text x="310" y="193" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">
    Dahua vs Hikvision
  </text>

  <rect x="620" y="156" width="540" height="56" rx="28" fill="url(#rightHeader)"/>
  <text x="890" y="193" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">
    Ventajas del Video IP
  </text>

  <rect x="52" y="236" width="516" height="314" rx="20" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="84" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Seguridad y acceso</text>
  <text x="84" y="328" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#1e293b">Dahua: reset fisico en varios modelos</text>
  <text x="84" y="362" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#1e293b">Hikvision: recuperacion por software tecnico</text>
  <text x="84" y="418" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Monitoreo movil</text>
  <text x="84" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#1e293b">Ambas marcas con app P2P en tiempo real</text>
  <text x="84" y="514" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Garantia y respaldo</text>

  <rect x="632" y="236" width="516" height="314" rx="20" fill="#ffffff" stroke="#fdba74" stroke-width="2"/>
  <circle cx="718" cy="300" r="64" fill="#dbeafe"/>
  <path d="M718 236 A64 64 0 1 1 664 329" fill="none" stroke="#2563eb" stroke-width="16"/>
  <text x="718" y="312" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" fill="#1e3a8a">80%</text>
  <text x="806" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Ahorro en almacenamiento</text>
  <text x="806" y="324" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">H.264 reduce peso de video</text>
  <text x="806" y="358" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">frente a formatos antiguos</text>

  <text x="662" y="426" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">PoE simplifica instalacion</text>
  <text x="662" y="462" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">Energia y datos por un solo cable</text>
  <text x="662" y="510" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Escalable y con IA</text>

  <rect x="40" y="570" width="1120" height="34" rx="12" fill="#1e3a8a"/>
  <text x="600" y="594" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">
    Resolucion HD | Escalabilidad | Inteligencia en sistemas IP
  </text>
</svg>
