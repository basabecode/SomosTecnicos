<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Costo de reparar electrodomesticos</title>
  <desc id="desc">Ilustracion de tecnico con calculadora y presupuesto de reparacion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3f1d0d"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="930" cy="150" r="170" fill="#fdba74" opacity="0.2"/>
  <rect x="760" y="160" width="250" height="330" rx="20" fill="#ffedd5"/>
  <rect x="795" y="210" width="180" height="32" rx="8" fill="#fb923c"/>
  <rect x="795" y="265" width="180" height="20" rx="8" fill="#fdba74"/>
