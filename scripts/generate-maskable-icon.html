<!DOCTYPE html>
<!--
  Generador de Maskable Icon — SomosTécnicos
  Abre este archivo en Chrome, espera que cargue y haz clic en "Descargar".
  Guarda el PNG como: public/maskable-icon-512x512.png
  Luego agrégalo al site.webmanifest con purpose: "maskable"
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generar Maskable Icon</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 40px; background: #111; color: #fff; }
    canvas { border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    button { padding: 12px 32px; background: #a50034; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; }
    button:hover { background: #8a0029; }
    p { color: #999; font-size: 13px; text-align: center; max-width: 400px; }
  </style>
</head>
<body>
  <h2>Maskable Icon — SomosTécnicos</h2>
  <canvas id="canvas" width="512" height="512"></canvas>
  <p>Previsualización con máscara circular (así lo muestra Android)</p>
  <canvas id="preview" width="200" height="200" style="border-radius: 50%;"></canvas>
  <button onclick="download()">⬇ Descargar maskable-icon-512x512.png</button>
  <p>Guarda el archivo en <code>public/maskable-icon-512x512.png</code></p>

  <script>
    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')
    const SIZE = 512
    // Zona segura maskable = 80% del tamaño (10% padding cada lado)
    const SAFE_ZONE = SIZE * 0.80
    const OFFSET = (SIZE - SAFE_ZONE) / 2

    const img = new Image()
    img.src = '../public/img-3d/favicon-st-metalizado.png'

    img.onload = () => {
      // 1. Fondo oscuro de marca
      const grad = ctx.createRadialGradient(SIZE/2, SIZE/2, 0, SIZE/2, SIZE/2, SIZE/2)
      grad.addColorStop(0, '#2d1420')
      grad.addColorStop(1, '#1a0a0f')
      ctx.fillStyle = grad
      ctx.fillRect(0, 0, SIZE, SIZE)

      // 2. Halo sutil rojo en la esquina superior derecha
      const halo = ctx.createRadialGradient(SIZE * 0.75, SIZE * 0.25, 0, SIZE * 0.75, SIZE * 0.25, SIZE * 0.4)
      halo.addColorStop(0, 'rgba(165,0,52,0.15)')
      halo.addColorStop(1, 'rgba(165,0,52,0)')
      ctx.fillStyle = halo
      ctx.fillRect(0, 0, SIZE, SIZE)

      // 3. Logo ST dentro de la zona segura (con padding extra para que respire)
      const LOGO_SIZE = SAFE_ZONE * 0.82
      const LOGO_OFFSET = (SIZE - LOGO_SIZE) / 2
      ctx.drawImage(img, LOGO_OFFSET, LOGO_OFFSET, LOGO_SIZE, LOGO_SIZE)

      // Previsualización circular
      const prev = document.getElementById('preview')
      const pctx = prev.getContext('2d')
      pctx.beginPath()
      pctx.arc(100, 100, 100, 0, Math.PI * 2)
      pctx.clip()
      pctx.drawImage(canvas, 0, 0, 200, 200)
    }

    img.onerror = () => {
      // Fallback: intentar con ruta relativa distinta
      img.src = '/img-3d/favicon-st-metalizado.png'
    }

    function download() {
      const link = document.createElement('a')
      link.download = 'maskable-icon-512x512.png'
      link.href = canvas.toDataURL('image/png')
      link.click()
    }
  </script>
</body>
</html>
